name: Universal Cloud Monitor

on:
  schedule:
    # 10分おきに自動実行
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手動実行用のボタン

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 変更された history.json をリポジトリに保存するために必須の権限

    steps:
    - name: コードの取得
      uses: actions/checkout@v4

    - name: Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: ライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 監視スクリプトの実行
      env:
        # 先ほど登録したRepository secretsから安全に読み込みます
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        CSV_URL: ${{ secrets.CSV_URL }}
      run: python monitor.py

    - name: 履歴の保存（オートコミット）
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update history.json [skip ci]"
        file_pattern: 'history.json'
